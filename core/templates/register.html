
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register · ink.</title>
  <link rel="stylesheet" href="{% static 'css/blog.css' %}" />
</head>
<body>

  <nav class="navbar">
    <div class="navbar__inner">
      <a href="{% url 'home' %}" class="navbar__brand">ink<span>.</span></a>
      <div class="navbar__links">
        <a href="{% url 'home' %}">Home</a>
      </div>
      <div class="navbar__auth">
        <a href="{% url 'login' %}" class="btn btn--ghost btn--sm">Sign in</a>
      </div>
    </div>
  </nav>

  <div class="form-page">
    <div class="form-card">

      <div class="form-card__header">
        <p class="form-card__eyebrow">Get started</p>
        <h1 class="form-card__title">Join ink<span style="color:var(--accent)">.</span></h1>
        <p class="form-card__sub">Already have an account? <a href="{% url 'login' %}">Sign in →</a></p>
      </div>

      <form action="#" method="POST">

        <div class="form-group">
          <label class="form-label" for="username">Username *</label>
          <input
            type="text"
            id="username"
            name="username"
            class="form-input"
            placeholder="choose_a_username"
            autofocus
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Email address</label>
          <input
            type="email"
            id="email"
            name="email"
            class="form-input"
            placeholder="you@example.com"
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="password1">Password *</label>
          <input
            type="password"
            id="password1"
            name="password1"
            class="form-input"
            placeholder="at least 8 characters"
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="password2">Confirm password *</label>
          <input
            type="password"
            id="password2"
            name="password2"
            class="form-input"
            placeholder="repeat password"
          />
        </div>

        <button type="submit" class="btn btn--primary btn--full" style="margin-top:8px;">
          Create account
        </button>

      </form>

      <p class="form-footer-text">By registering, you agree to write interesting things.</p>

    </div>
  </div>

  <footer class="footer">
    <div class="footer__inner">
      <span class="footer__brand">ink<span>.</span></span>
      <span class="footer__copy">&copy; 2026 · Built with Django</span>
    </div>
  </footer>

</body>
</html>
